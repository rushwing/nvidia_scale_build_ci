## re/docker-compose.yml
## Local build infrastructure: BuildBuddy (UI + cache + BES) + bazel-remote (cache-only fallback)
##
## Quick start:
##   docker compose -f re/docker-compose.yml up -d
##
## Then choose a config:
##   bazel build //... --config=buildbuddy       ← UI at http://localhost:8080
##   bazel build //... --config=remote_cache     ← bazel-remote only (no UI)
##
## Docs:
##   BuildBuddy OSS: https://github.com/buildbuddy-io/buildbuddy
##   bazel-remote:   https://github.com/buchgr/bazel-remote

version: "3.8"

services:

  # ── BuildBuddy OSS ─────────────────────────────────────────────────────────
  # Provides:  Web UI + BES + remote cache — all multiplexed on port 8080
  # via cmux (HTTP/1.1 for UI, HTTP/2 gRPC for Bazel clients).
  # Port 9090 inside the container is HTTP/1.1 monitoring only — not exposed.
  buildbuddy:
    image: gcr.io/flame-public/buildbuddy-app-onprem:latest
    platform: linux/amd64
    container_name: buildbuddy
    ports:
      - "8080:8080"   # cmux: Web UI (HTTP/1.1) + BES/cache (gRPC/HTTP2)
    volumes:
      - buildbuddy-data:/data
      - ./buildbuddy.yaml:/config.yaml:ro
    restart: unless-stopped

  # ── bazel-remote ───────────────────────────────────────────────────────────
  # Lightweight cache-only server (no UI). Kept as a fallback / comparison.
  # Use --config=remote_cache to target this instead of BuildBuddy.
  bazel-remote:
    image: buchgr/bazel-remote-cache:latest
    platform: linux/amd64
    container_name: bazel-remote
    ports:
      - "9092:9092"   # HTTP cache  → --remote_cache=http://localhost:9092
      - "9093:9093"   # gRPC cache  → --remote_cache=grpc://localhost:9093
    volumes:
      - bazel-remote-data:/data
    command: >
      --dir=/data
      --max_size=5
      --port=9092
      --grpc_port=9093
    restart: unless-stopped

volumes:
  buildbuddy-data:
  bazel-remote-data:
