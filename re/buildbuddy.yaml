# re/buildbuddy.yaml — BuildBuddy OSS on-prem config
# Mounted into the container at /config.yaml
# Full reference: https://www.buildbuddy.io/docs/config-yaml

app:
  build_buddy_url: "http://localhost:8080"
  # events_api_url is the gRPC BES endpoint clients connect to
  events_api_url: "grpc://localhost:9090"
  cache_api_url: "grpc://localhost:9090"

database:
  # SQLite is sufficient for local dev; use MySQL/Postgres for team deployments
  data_source: "sqlite3:///data/buildbuddy.db"

storage:
  ttl_seconds: 86400   # keep artifacts for 24h
  chunk_file_size_bytes: 3000000
  disk:
    root_directory: /data/storage

cache:
  max_size_bytes: 5368709120  # 5 GB
  disk:
    root_directory: /data/cache
